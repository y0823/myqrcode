<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">二维码工作室</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .lang-switch {
            display: flex;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }
        .lang-switch button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .lang-switch button.active {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3H10V10H3V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 3H21V10H14V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 14H21V21H14V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3 14H10V21H3V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 10L14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span data-i18n="title">二维码工作室</span>
            </div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="guide.html" data-i18n="link_guide" style="color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'">📖 使用说明</a>
                <div class="lang-switch">
                    <button id="lang-zh" class="active">中文</button>
                    <button id="lang-en">EN</button>
                </div>
            </div>
        </header>

        <main>
            <div class="glass-panel main-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-target="single" data-i18n="tab_single">单张生成</button>
                    <button class="tab-btn" data-target="batch" data-i18n="tab_batch">批量生成</button>
                </div>

                <div class="tab-content active" id="single">
                    <div class="form-group">
                        <label data-i18n="label_qr_type">二维码类型</label>
                        <div class="type-selector" style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <button type="button" class="type-btn active" data-type="text" data-i18n="type_text" style="flex: 1; padding: 0.5rem; border: 1px solid var(--panel-border); border-radius: 6px; background: rgba(15,23,42,0.4); color: var(--text-secondary); cursor: pointer; font-size: 0.875rem;">文本/链接</button>
                            <button type="button" class="type-btn" data-type="wifi" data-i18n="type_wifi" style="flex: 1; padding: 0.5rem; border: 1px solid var(--panel-border); border-radius: 6px; background: rgba(15,23,42,0.4); color: var(--text-secondary); cursor: pointer; font-size: 0.875rem;">WiFi 网络</button>
                            <button type="button" class="type-btn" data-type="vcard" data-i18n="type_vcard" style="flex: 1; padding: 0.5rem; border: 1px solid var(--panel-border); border-radius: 6px; background: rgba(15,23,42,0.4); color: var(--text-secondary); cursor: pointer; font-size: 0.875rem;">电子名片</button>
                        </div>
                    </div>

                    <!-- Text Input Form -->
                    <div id="type-form-text" class="type-form active">
                        <div class="form-group">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <label for="qr-text" data-i18n="label_content" style="margin-bottom: 0;">二维码内容</label>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <button type="button" id="single-clear-btn" style="background: none; border: 1px solid var(--panel-border); color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; display: none; width: auto;" title="清空内容">× 清空</button>
                                    <span id="single-char-count" style="font-size: 0.8rem; color: var(--text-secondary); font-weight: bold;">0 / 500</span>
                                </div>
                            </div>
                            <textarea id="qr-text" data-i18n-placeholder="placeholder_single" placeholder="请输入网址、文本或数据..." rows="3" ></textarea>
                        </div>
                    </div>

                    <!-- WiFi Input Form -->
                    <div id="type-form-wifi" class="type-form" style="display: none; animation: fadeIn 0.4s ease;">
                        <div class="form-group">
                            <label for="wifi-ssid" data-i18n="label_wifi_ssid">WiFi 名称 (SSID)</label>
                            <input type="text" id="wifi-ssid" data-i18n-placeholder="placeholder_wifi_ssid" placeholder="请输入 WiFi 名称">
                        </div>
                        <div class="form-group">
                            <label for="wifi-password" data-i18n="label_wifi_password">密码</label>
                            <input type="text" id="wifi-password" data-i18n-placeholder="placeholder_wifi_password" placeholder="请输入 WiFi 密码">
                        </div>
                        <div class="options-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                            <div class="form-group">
                                <label for="wifi-security" data-i18n="label_wifi_security">加密类型</label>
                                <select id="wifi-security" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 1rem; font-family: inherit; transition: all 0.3s ease;">
                                    <option value="WPA">WPA/WPA2</option>
                                    <option value="WEP">WEP</option>
                                    <option value="nopass" data-i18n="wifi_security_none">无加密 (Open)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: row; align-items: center; margin-top: 1.8rem; padding-left: 0.5rem; gap: 0.5rem;">
                                <input type="checkbox" id="wifi-hidden" style="width: auto; cursor: pointer;">
                                <label for="wifi-hidden" data-i18n="label_wifi_hidden" style="margin-bottom: 0; cursor: pointer; user-select: none;">隐藏网络</label>
                            </div>
                        </div>
                    </div>

                    <!-- vCard Input Form -->
                    <div id="type-form-vcard" class="type-form" style="display: none; animation: fadeIn 0.4s ease;">
                        <div class="options-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="vcard-fn" data-i18n="label_vcard_fn">姓名</label>
                                <input type="text" id="vcard-fn" data-i18n-placeholder="placeholder_vcard_fn" placeholder="例如：张三">
                            </div>
                            <div class="form-group">
                                <label for="vcard-org" data-i18n="label_vcard_org">公司 / 组织</label>
                                <input type="text" id="vcard-org" data-i18n-placeholder="placeholder_vcard_org" placeholder="公司或学校名称">
                            </div>
                            <div class="form-group">
                                <label for="vcard-title" data-i18n="label_vcard_title">职位 / 头衔</label>
                                <input type="text" id="vcard-title" data-i18n-placeholder="placeholder_vcard_title" placeholder="例如：产品经理">
                            </div>
                            <div class="form-group">
                                <label for="vcard-tel" data-i18n="label_vcard_tel">电话号码</label>
                                <input type="text" id="vcard-tel" data-i18n-placeholder="placeholder_vcard_tel" placeholder="请输入手机或电话号码">
                            </div>
                            <div class="form-group">
                                <label for="vcard-email" data-i18n="label_vcard_email">电子邮箱</label>
                                <input type="email" id="vcard-email" data-i18n-placeholder="placeholder_vcard_email" placeholder="example@email.com">
                            </div>
                            <div class="form-group">
                                <label for="vcard-url" data-i18n="label_vcard_url">网址</label>
                                <input type="text" id="vcard-url" data-i18n-placeholder="placeholder_vcard_url" placeholder="https://example.com">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="batch">
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label for="qr-batch-text" data-i18n="label_batch" style="margin-bottom: 0;">批量内容（每行一条，最多100条）</label>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <button type="button" id="batch-clear-btn" style="background: none; border: 1px solid var(--panel-border); color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; display: none; width: auto;" title="清空内容">× 清空</button>
                                <span id="batch-line-count" style="font-size: 0.8rem; color: var(--text-secondary); font-weight: bold;">0 / 100</span>
                            </div>
                        </div>
                        <div id="batch-input-area">
                            <textarea id="qr-batch-text" data-i18n-placeholder="placeholder_batch" placeholder="https://example.com&#10;https://google.com&#10;你好，世界" rows="6"></textarea>
                        </div>
                        <div id="batch-file-info" style="display: none; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 0.5rem; text-align: center; border: 1px dashed var(--primary);">
                            <div style="margin-bottom: 0.5rem;"><span id="batch-filename" style="font-weight: bold;"></span> (<span id="batch-filelines"></span> 条)</div>
                            <button type="button" id="batch-file-remove" class="secondary-btn" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;" data-i18n="btn_remove_file">移除文件</button>
                        </div>
                        <div id="batch-upload-wrapper" style="margin-top: 1rem;">
                            <label for="qr-batch-file" id="qr-batch-file-label" class="primary-btn" style="display: block; padding: 0.6rem; font-size: 0.9rem; cursor: pointer; text-align: center; border-radius: 8px; width: 100%; box-sizing: border-box; transition: opacity 0.3s;">
                                📄 <span data-i18n="btn_upload_txt">上传 TXT 文本文件</span>
                            </label>
                            <input type="file" id="qr-batch-file" accept=".txt" style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="options-grid">
                    <div class="form-group">
                        <label for="qr-size" data-i18n="label_size">尺寸 (px)</label>
                        <input type="number" id="qr-size" value="300" min="100" max="1000">
                    </div>
                    
                    <div class="form-group">
                        <label for="qr-color-dark" data-i18n="label_color_dark">二维码颜色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qr-color-dark" value="#000000">
                            <span class="color-hex" id="color-dark-hex">#000000</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="qr-color-light" data-i18n="label_color_light">背景颜色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qr-color-light" value="#ffffff">
                            <span class="color-hex" id="color-light-hex">#ffffff</span>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="qr-logo" data-i18n="label_logo">自定义 Logo（可选）</label>
                        <input type="file" id="qr-logo" accept="image/*">
                    </div>
                </div>

                <button id="generate-btn" class="primary-btn" data-i18n="btn_generate">生成二维码</button>
            </div>

            <div class="glass-panel preview-panel">
                <div class="preview-header" data-i18n="header_preview">预览</div>
                <div class="preview-container">
                    <div id="loading" class="hidden" data-i18n="text_loading">生成中...</div>
                    <img id="qr-preview" src="" data-i18n-alt="alt_qr" alt="已生成的二维码" class="hidden">
                    <div id="empty-state" data-i18n="text_empty">您的二维码将显示在这里</div>
                </div>
                
                <div class="actions hidden" id="result-actions" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%;">
                    <button id="copy-btn" class="secondary-btn" data-i18n="btn_copy" style="grid-column: 1 / -1; width: 100%;">复制图片</button>
                    <button id="download-btn" class="primary-btn" data-i18n="btn_download_png" style="width: 100%;">下载 PNG</button>
                    <button id="download-svg-btn" class="primary-btn" data-i18n="btn_download_svg" style="width: 100%; background: #10b981; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);">下载 SVG</button>
                </div>
                <div class="actions hidden" id="batch-actions">
                    <button id="download-batch-btn" class="primary-btn" data-i18n="btn_download_batch">全部下载 (ZIP压缩包)</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js?v=16"></script>
</body>
</html>
